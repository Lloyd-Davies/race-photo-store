events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Disable buffering for large file headers coming from the API
    proxy_buffering off;

    # Log to stdout/stderr so Portainer can pick them up
    access_log  /dev/stdout;
    error_log   /dev/stderr warn;

    server {
        listen 8080;
        server_name _;

        # ------------------------------------------------------------------
        # Proof images — served directly by nginx, no API involvement
        # Cache headers let Cloudflare edge-cache aggressively
        # ------------------------------------------------------------------
        location /proofs/ {
            alias /srv/photos/proofs/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # ------------------------------------------------------------------
        # Internal location for ZIP delivery via X-Accel-Redirect
        # Only accessible by nginx itself (internal directive)
        # ------------------------------------------------------------------
        location /_internal_zips/ {
            internal;
            alias /srv/photos/zips/;
        }

        # ------------------------------------------------------------------
        # API — proxied to the FastAPI container
        # ------------------------------------------------------------------
        location /api/ {
            proxy_pass http://api:8000/api/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Stripe webhook needs the raw body intact
            proxy_request_buffering off;
        }

        # ------------------------------------------------------------------
        # Download tokens — API validates token and responds with
        # X-Accel-Redirect; nginx then serves the ZIP from /_internal_zips/
        # ------------------------------------------------------------------
        location /d/ {
            proxy_pass http://api:8000/d/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Must be off so nginx acts on X-Accel-Redirect instead of
            # forwarding the upstream body to the client
            proxy_buffering off;
        }
    }
}
