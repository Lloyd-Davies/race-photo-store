events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    server_tokens off;
    limit_req_status 429;

    limit_req_zone $binary_remote_addr zone=api_admin:10m rate=20r/m;
    limit_req_zone $binary_remote_addr zone=api_unlock:10m rate=15r/m;
    limit_req_zone $binary_remote_addr zone=api_orders:10m rate=120r/m;
    limit_req_zone $binary_remote_addr zone=api_webhook:10m rate=60r/m;

    sendfile        on;
    keepalive_timeout 65;

    # Disable buffering for large file headers coming from the API
    proxy_buffering off;

    # Log to stdout/stderr so Portainer can pick them up
    access_log  /dev/stdout;
    error_log   /dev/stderr warn;

    server {
        listen 8080;
        server_name _;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ------------------------------------------------------------------
        # Internal location for proof delivery via X-Accel-Redirect
        # Only accessible by nginx itself (internal directive)
        # ------------------------------------------------------------------
        location /_internal_proofs/ {
            internal;
            alias /srv/photos/proofs/;
        }

        # ------------------------------------------------------------------
        # Internal location for ZIP delivery via X-Accel-Redirect
        # Only accessible by nginx itself (internal directive)
        # ------------------------------------------------------------------
        location /_internal_zips/ {
            internal;
            alias /srv/photos/zips/;
        }

        # Use Docker's internal DNS so upstream hostnames resolve at request
        # time rather than at nginx startup (avoids "host not found" crash
        # when the api container hasn't registered yet).
        # cloudflared reaches nginx at http://photostore-nginx:8080 —
        # set this as the Public Hostname URL in the Cloudflare Zero Trust
        # tunnel config (Networks -> Tunnels -> your tunnel -> Public Hostnames).
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $api_upstream http://api:8000;

        location ^~ /api/admin/ {
            limit_req zone=api_admin burst=20 nodelay;
            proxy_pass $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_request_buffering off;
            client_max_body_size 100m;
        }

        location = /api/stripe/webhook {
            limit_req zone=api_webhook burst=30 nodelay;
            proxy_pass $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_request_buffering off;
        }

        location ~ ^/api/events/[0-9]+/unlock$ {
            limit_req zone=api_unlock burst=15 nodelay;
            proxy_pass $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_request_buffering off;
        }

        location ~ ^/api/orders/[0-9]+$ {
            limit_req zone=api_orders burst=60 nodelay;
            proxy_pass $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_request_buffering off;
        }

        # ------------------------------------------------------------------
        # API — proxied to the FastAPI container
        # ------------------------------------------------------------------
        location /api/ {
            proxy_pass $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Stripe webhook needs the raw body intact
            proxy_request_buffering off;

            # Allow admin photo uploads (full-res JPEGs can be 20-50 MB).
            # The default nginx limit is 1 MB which causes 413 for image uploads.
            client_max_body_size 100m;
        }

        # ------------------------------------------------------------------
        # Download tokens — API validates token and responds with
        # X-Accel-Redirect; nginx then serves the ZIP from /_internal_zips/
        # ------------------------------------------------------------------
        location /d/ {
            proxy_pass $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Must be off so nginx acts on X-Accel-Redirect instead of
            # forwarding the upstream body to the client
            proxy_buffering off;
        }

        # ------------------------------------------------------------------
        # React SPA — serve pre-built frontend; fall back to index.html for
        # client-side routes so React Router handles them.
        # ------------------------------------------------------------------
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            expires -1;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            add_header Cache-Control "no-store";
        }

        # Static assets from the Vite build get long-lived cache headers.
        # Vite fingerprints filenames so stale content is never an issue.
        location ~* \.(js|css|woff2?|png|jpg|svg|ico|webp)$ {
            root /usr/share/nginx/html;
            try_files $uri =404;
            expires 1y;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            add_header Cache-Control "public, immutable";
        }
    }
}
