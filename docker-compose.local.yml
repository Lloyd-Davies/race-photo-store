# Local development overrides — replaces Linux VM paths with local relative paths.
# Usage: docker compose -f docker-compose.yml -f docker-compose.local.yml up
#
# Data is stored under .localdata/ (gitignored).

services:
  postgres:
    volumes:
      - ./.localdata/pgdata:/var/lib/postgresql/data

  redis:
    volumes:
      - ./.localdata/redis:/data

  api:
    volumes:
      - ./.localdata/photos:/data/photos

  worker:
    volumes:
      - ./.localdata/photos:/data/photos

  nginx:
    # Use the pre-built image in local dev — no need to rebuild the frontend.
    # Bind-mount the config so changes are picked up without a rebuild.
    image: nginx:1.27-alpine
    build: !reset null
    volumes:
      - ./.localdata/photos:/srv/photos:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  # Cloudflare Tunnel not needed in local dev — disable it
  cloudflared:
    profiles: ["vm-only"]
