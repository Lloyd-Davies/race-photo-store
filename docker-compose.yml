services:
  postgres:
    container_name: photostore-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: photostore
      POSTGRES_USER: photostore
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./data/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U photostore -d photostore"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [photostore]
    restart: unless-stopped

  redis:
    container_name: photostore-redis
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [photostore]
    restart: unless-stopped

  api:
    container_name: photostore-api
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://photostore:${POSTGRES_PASSWORD}@postgres:5432/photostore
      REDIS_URL: redis://redis:6379/0
      STORAGE_ROOT: /data/photos
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-}
      ADMIN_SESSION_TTL_MINUTES: ${ADMIN_SESSION_TTL_MINUTES:-30}
      ADMIN_REFRESH_TTL_HOURS: ${ADMIN_REFRESH_TTL_HOURS:-12}
      EVENT_ACCESS_TTL_HOURS: ${EVENT_ACCESS_TTL_HOURS:-12}
      ORDER_ACCESS_TTL_HOURS: ${ORDER_ACCESS_TTL_HOURS:-720}
      MAX_PHOTO_UPLOAD_BYTES: ${MAX_PHOTO_UPLOAD_BYTES:-104857600}
      SITE_NAME: ${SITE_NAME:-Race Photos}
      SITE_TAGLINE: ${SITE_TAGLINE:-Your race, your photos.}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Race Photos}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL:-}
      ORDER_EMAIL_REQUIRED: ${ORDER_EMAIL_REQUIRED:-true}
      UVICORN_WORKERS: "2"
    volumes:
      - ./data/photos:/data/photos
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [photostore]
    restart: unless-stopped

  worker:
    container_name: photostore-worker
    build:
      context: .
      dockerfile: worker/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://photostore:${POSTGRES_PASSWORD}@postgres:5432/photostore
      REDIS_URL: redis://redis:6379/0
      STORAGE_ROOT: /data/photos
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Race Photos}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL:-}
      CELERY_CONCURRENCY: "2"
    volumes:
      - ./data/photos:/data/photos
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [photostore]
    restart: unless-stopped

  nginx:
    container_name: photostore-nginx
    build:
      context: .
      dockerfile: nginx/Dockerfile
    volumes:
      - ./data/photos:/srv/photos:ro
    depends_on:
      - api
    ports:
      - "127.0.0.1:8081:8080"
    networks: [photostore]
    restart: unless-stopped

  cloudflared:
    container_name: photostore-cloudflared
    image: cloudflare/cloudflared:latest
    command: tunnel run --token ${TUNNEL_TOKEN}
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx
    networks: [photostore]
    restart: unless-stopped

networks:
  photostore:
    name: photostore
    driver: bridge
