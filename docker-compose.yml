services:
  postgres:
    container_name: photostore-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: photostore
      POSTGRES_USER: photostore
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /mnt/pstore/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U photostore -d photostore"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [photostore]
    restart: unless-stopped

  redis:
    container_name: photostore-redis
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - /mnt/pstore/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [photostore]
    restart: unless-stopped

  api:
    container_name: photostore-api
    image: photostore-api:dev
    environment:
      DATABASE_URL: postgresql+psycopg://photostore:${POSTGRES_PASSWORD}@postgres:5432/photostore
      REDIS_URL: redis://redis:6379/0
      STORAGE_ROOT: /data/photos
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      UVICORN_WORKERS: "2"
    volumes:
      - /mnt/pstore/photos:/data/photos
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [photostore]
    restart: unless-stopped

  worker:
    container_name: photostore-worker
    image: photostore-worker:dev
    environment:
      DATABASE_URL: postgresql+psycopg://photostore:${POSTGRES_PASSWORD}@postgres:5432/photostore
      REDIS_URL: redis://redis:6379/0
      STORAGE_ROOT: /data/photos
      CELERY_CONCURRENCY: "2"
    volumes:
      - /mnt/pstore/photos:/data/photos
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [photostore]
    restart: unless-stopped

  nginx:
    container_name: photostore-nginx
    image: nginx:1.27-alpine
    volumes:
      - /mnt/pstore/photos:/srv/photos:ro
      - /opt/photostore/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    ports:
      - "127.0.0.1:8081:8080"
    networks: [photostore]
    restart: unless-stopped

  cloudflared:
    container_name: photostore-cloudflared
    image: cloudflare/cloudflared:latest
    command: tunnel run --token ${TUNNEL_TOKEN}
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx
    networks: [photostore]
    restart: unless-stopped

networks:
  photostore:
    name: photostore
    driver: bridge
