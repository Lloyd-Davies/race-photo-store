name: Build & push images

on:
  push:
    branches: [dev, main]
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: api
            dockerfile: api/Dockerfile
          - service: worker
            dockerfile: worker/Dockerfile
          - service: nginx
            dockerfile: nginx/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image prefix
        run: echo "IMAGE_PREFIX=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/race-photo-store" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (for ARM64 cross-build)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: image_tags
        shell: bash
        run: |
          REF="${GITHUB_REF}"
          REF_NAME="${GITHUB_REF_NAME}"
          SHORT_SHA="${GITHUB_SHA::7}"
          SERVICE="${{ matrix.service }}"

          if [[ "$REF" == refs/tags/v* ]]; then
            echo "tags=${IMAGE_PREFIX}/${SERVICE}:${REF_NAME}" >> "$GITHUB_OUTPUT"
          elif [[ "$REF" == "refs/heads/main" ]]; then
            printf "tags=%s/%s:latest,%s/%s:main-%s\n" \
              "$IMAGE_PREFIX" "$SERVICE" "$IMAGE_PREFIX" "$SERVICE" "$SHORT_SHA" >> "$GITHUB_OUTPUT"
          else
            printf "tags=%s/%s:dev-latest,%s/%s:dev-%s\n" \
              "$IMAGE_PREFIX" "$SERVICE" "$IMAGE_PREFIX" "$SERVICE" "$SHORT_SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image_tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
